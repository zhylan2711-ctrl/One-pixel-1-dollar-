<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель керування</title>
    <style>
        body { background-color: #0d1117; color: #e6edf3; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: #161b22; padding: 40px; border-radius: 20px; border: 1px solid #30363d; text-align: center; width: 320px; }
        input[type="color"] { width: 100%; height: 50px; border-radius: 10px; border: none; margin: 20px 0; cursor: pointer; }
        .btn-save { background: #27ae60; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        .contact-group { margin-top: 20px; width: 320px; }
        .btn-c { display: block; background: #21262d; color: #27ae60; padding: 12px; border-radius: 10px; text-decoration: none; margin-bottom: 10px; border: 1px solid #30363d; text-align: center; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:#27ae60">КОЛІР</h2>
        <input type="color" id="colorPicker" value="#27ae60">
        <button class="btn-save" onclick="save()">ЗБЕРЕГТИ</button>
    </div>
    <div class="contact-group">
        <a href="https://t.me" class="btn-c">📩 Написати Адміну</a>
        <a href="tel:+380991222371" class="btn-c">📞 Зателефонувати</a>
        <a href="index.html" style="color:#8b949e; display:block; text-align:center; margin-top:10px">⬅ Назад</a>
    </div>

    <script>
        function save() {
            localStorage.setItem('userPixelColor', document.getElementById('colorPicker').value);
            alert('Колір збережено для нових пікселів!');
        }
        document.getElementById('colorPicker').value = localStorage.getItem('userPixelColor') || '#27ae60';
    </script>
</body>
</html>
